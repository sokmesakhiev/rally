test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>

local:
  service: Disk
  root: <%= Rails.root.join("storage") %>

# Production: S3 via ECS IAM task role (no access keys needed).
# AWS_BUCKET and AWS_REGION are injected by the ECS task definition.
amazon:
  service: S3
  region: <%= ENV.fetch("AWS_REGION", "us-east-1") %>
  bucket: <%= ENV.fetch("AWS_BUCKET") %>
